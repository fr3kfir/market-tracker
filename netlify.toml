[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "vite"
  port = 5173

[[redirects]]
  from = "/api/quotes"
  to = "/.netlify/functions/quotes"
  status = 200

[[redirects]]
  from = "/api/history"
  to = "/.netlify/functions/quotes?type=history"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
